name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.5.0)"
        required: true
        type: string
      title:
        description: "Release title"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean
      notes_file:
        description: "Path to markdown release notes template"
        required: false
        default: ".github/release-notes-template.md"
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release from template
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          PRERELEASE: ${{ inputs.prerelease }}
          NOTES_FILE: ${{ inputs.notes_file }}
        run: |
          set -euo pipefail
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Notes file not found: $NOTES_FILE" >&2
            exit 1
          fi

          release_title="$TITLE"
          if [ -z "$release_title" ]; then
            release_title="$TAG"
          fi

          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$TAG" \
            --title "$release_title" \
            --notes-file "$NOTES_FILE" \
            $prerelease_flag
